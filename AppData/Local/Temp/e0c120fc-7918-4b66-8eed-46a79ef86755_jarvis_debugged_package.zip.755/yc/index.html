<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiptivitas Shipping Requests Kanban</title>
    <!-- Load Tailwind CSS for modern styling and responsiveness -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Apply Inter font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7fa;
        }

        /* Load Dragula CSS for basic drag-and-drop styling */
        @import url('https://cdnjs.cloudflare.com/ajax/libs/dragula/3.7.2/dragula.min.css');

        /* Custom Dragula classes for dragging state */
        .gu-transit {
            /* While item is being dragged */
            opacity: 0.7;
            transform: scale(0.98);
        }

        .gu-mirror {
            /* Mirror element follows cursor */
            opacity: 0.8;
            background-color: #ffffff;
            border: 2px solid #3b82f6; /* Tailwind Blue-500 */
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Kanban Specific Styles */
        .Swimlane-column {
            /* Required class for swimlanes */
            min-height: 80vh; /* Ensure columns are visible */
            max-height: 80vh;
            overflow-y: auto;
            /* Scrollbar styling for better aesthetics */
            scrollbar-width: thin;
            scrollbar-color: #ccc #f0f0f0;
        }
        .Swimlane-column::-webkit-scrollbar {
            width: 8px;
        }
        .Swimlane-column::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 4px;
        }
        .Swimlane-column::-webkit-scrollbar-track {
            background-color: #f0f0f0;
        }

        .kanban-card {
            cursor: grab;
            transition: all 0.2s ease-in-out;
        }

        .kanban-card:active {
            cursor: grabbing;
        }

    </style>
</head>
<body class="p-4 md:p-8">

    <header class="mb-8">
        <h1 class="text-4xl font-bold text-gray-800">Shipping Requests Dashboard</h1>
        <p class="text-gray-500 mt-1">Kanban View for managing tasks: Drag and drop to update status.</p>
    </header>

    <!-- Kanban Board Container -->
    <main id="kanban-board" class="flex flex-col md:flex-row gap-6">

        <!-- Backlog Swimlane (Grey) -->
        <section class="flex-1 min-w-xs">
            <h2 class="text-xl font-semibold mb-3 text-gray-700">Backlog (New Tasks)</h2>
            <div id="backlog" class="Swimlane-column p-4 space-y-4 bg-gray-50 rounded-lg shadow-inner border border-gray-200">
                <!-- Cards will be populated here by JavaScript -->
            </div>
        </section>

        <!-- In-Progress Swimlane (Blue) -->
        <section class="flex-1 min-w-xs">
            <h2 class="text-xl font-semibold mb-3 text-blue-700">In-Progress</h2>
            <div id="in-progress" class="Swimlane-column p-4 space-y-4 bg-blue-50 rounded-lg shadow-inner border border-blue-200">
                <!-- Cards will be dragged here -->
            </div>
        </section>

        <!-- Complete Swimlane (Green) -->
        <section class="flex-1 min-w-xs">
            <h2 class="text-xl font-semibold mb-3 text-green-700">Complete</h2>
            <div id="complete" class="Swimlane-column p-4 space-y-4 bg-green-50 rounded-lg shadow-inner border border-green-200">
                <!-- Cards will be dragged here -->
            </div>
        </section>

    </main>

    <!-- Load Dragula JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dragula/3.7.2/dragula.min.js"></script>

    <script>
        // Mock data representing the shipping requests currently in the application
        const SHIPPING_REQUESTS = [
            { id: 'req-001', title: 'Confirm customs declaration for Shanghai shipment', time: '1h 30m', priority: 'High', shipper: 'Global Exporters Inc.' },
            { id: 'req-002', title: 'Schedule pickup for Rotterdam consignment', time: '45m', priority: 'Medium', shipper: 'European Freight Co.' },
            { id: 'req-003', title: 'Verify tariff codes for South American cargo', time: '2h 0m', priority: 'High', shipper: 'LATAM Logistics' },
            { id: 'req-004', title: 'Upload Bill of Lading (BOL) for New York arrival', time: '20m', priority: 'Low', shipper: 'East Coast Imports' },
            { id: 'req-005', title: 'Review container seal reports', time: '1h 0m', priority: 'Medium', shipper: 'Ocean Carriers Ltd.' },
            { id: 'req-006', title: 'Draft client communication regarding delay', time: '15m', priority: 'High', shipper: 'Global Exporters Inc.' },
        ];

        const LANE_COLORS = {
            'backlog': {
                bg: 'bg-gray-100 border-gray-400 text-gray-700',
                border: 'border-l-4 border-gray-400',
            },
            'in-progress': {
                bg: 'bg-blue-100 border-blue-400 text-blue-700',
                border: 'border-l-4 border-blue-400',
            },
            'complete': {
                bg: 'bg-green-100 border-green-400 text-green-700',
                border: 'border-l-4 border-green-400',
            }
        };

        /**
         * Creates the HTML structure for a single shipping request card.
         * @param {Object} request - The shipping request data.
         * @param {string} laneId - The initial lane ID ('backlog').
         * @returns {HTMLElement} The card element.
         */
        function createCardElement(request, laneId) {
            const card = document.createElement('div');
            card.id = request.id;
            card.classList.add('kanban-card', 'p-4', 'rounded-lg', 'shadow-md', 'transition-colors', 'duration-300', 'border-l-4'); // Base classes

            // Apply initial color based on the starting lane (backlog)
            const color = LANE_COLORS[laneId];
            // FIX: Split the string of classes by space and use the spread operator
            card.classList.add(...color.bg.split(' '));
            card.classList.add(...color.border.split(' '));

            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <h3 class="text-sm font-semibold">${request.title}</h3>
                    <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-white/50">${request.priority}</span>
                </div>
                <div class="text-xs space-y-1">
                    <p class="font-bold text-xs opacity-75">Shipper: ${request.shipper}</p>
                    <p class="text-xs opacity-75">Est. Time: ${request.time}</p>
                    <p class="text-xs opacity-50 mt-1">ID: ${request.id}</p>
                </div>
            `;
            return card;
        }

        /**
         * Updates a card's color classes based on the new lane ID.
         * @param {HTMLElement} card - The card element to update.
         * @param {string} newLaneId - The ID of the lane it was dropped into.
         */
        function updateCardColor(card, newLaneId) {
            // Remove all existing color classes from the card
            Object.values(LANE_COLORS).forEach(color => {
                // FIX: Split the string of classes by space and use the spread operator for removal
                card.classList.remove(...color.bg.split(' '));
                card.classList.remove(...color.border.split(' '));
            });

            // Add the new color classes
            const newColor = LANE_COLORS[newLaneId];
            if (newColor) {
                // FIX: Split the string of classes by space and use the spread operator for adding
                card.classList.add(...newColor.bg.split(' '));
                card.classList.add(...newColor.border.split(' '));
            }
        }

        // 1. Initial Data Rendering
        function initializeBoard() {
            const backlogLane = document.getElementById('backlog');

            // All tasks should now show in the backlog swimlane
            SHIPPING_REQUESTS.forEach(request => {
                const card = createCardElement(request, 'backlog');
                backlogLane.appendChild(card);
            });

            // 2. Initialize Dragula
            const backlog = document.getElementById('backlog');
            const inProgress = document.getElementById('in-progress');
            const complete = document.getElementById('complete');

            // Initialize Dragula on the three swimlanes
            const lanes = [backlog, inProgress, complete];
            const drake = dragula(lanes);

            // 3. Handle Dragula Drop Event
            drake.on('drop', function (el, target, source, sibling) {
                // el: The element that was dropped (the card)
                // target: The container the element was dropped into (the new swimlane)
                // source: The container the element was dragged from (the old swimlane)
                // sibling: The element that was previously after the dropped element (for reordering)

                // When a card changes swimlane, it should change color
                const newLaneId = target.id;
                updateCardColor(el, newLaneId);

                // Frontend update complete. Here is where you would call an API
                // to persist the card's new status and order in a real application.
                console.log(`Card ${el.id} moved from ${source.id} to ${target.id}. Color updated.`);
            });

            console.log('Kanban board initialized with Dragula and mock data.');
        }

        // Start the application setup
        window.onload = initializeBoard;
    </script>
</body>
</html>
